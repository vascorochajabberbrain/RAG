solutions:
- id: peixe_fresco
  display_name: Peixe Fresco
  company_name: Peixe Fresco
  language: pt
  jbke_version_id: 35
  jbke_cbva_id: 12
  aliases:
  - pf
  collections:
  - id: peixe_fresco_products
    display_name: Products
    collection_name: peixe_fresco_products
    collection_type: scs
    jbke_rcm_id: 8
    scraper_name: peixe_fresco_products
    sources:
    - id: product_sitemap
      type: url
      label: Product sitemap (102 pages)
      scraper_name: peixe_fresco_products
    routing:
      description: Esta coleção contém uma variedade de produtos de peixe e marisco
        frescos, incluindo opções para preparo e consumo.
      keywords:
      - peixe fresco
      - marisco
      - cavala
      - folhado de bacalhau
      - sapateira
      - dourada
      - laranja
      - lulas
      - salmao
      - amêijoa
      - garoupa
      - sal
      - choco
      - tiras de choco
      - flor de sal
      - cavala fumada
      - abrotea
      typical_questions:
      - Quais são os produtos de marisco disponíveis?
      - Como preparar a cavala?
      - Quais são os preços dos peixes frescos?
      - O que é incluído no folhado de bacalhau?
      - Onde posso encontrar lulas a venda?
      not_covered:
      - receitas de cozinha
      - informações nutricionais
      - história dos peixes
      - técnicas de pesca
      - ações de sustentabilidade
      language: pt
      doc_type: product_catalog
    scraper_config:
      name: peixe_fresco_products
      engine: playwright
      scrape_mode: sitemap
      sitemap_url: https://store.peixefresco.com.pt/product-sitemap.xml
      excluded_urls:
      - https://store.peixefresco.com.pt/loja/
      text_selector: main, article, .entry-content, body
  - id: peixe_fresco_recipes
    display_name: Recipes
    collection_name: peixe_fresco_recipes
    collection_type: scs
    scraper_name: peixe_fresco_recipes
    sources:
    - id: recipe_sitemap
      type: url
      label: Recipe pages (11 pages)
      scraper_name: peixe_fresco_recipes
    - id: recipe_pdf
      type: pdf
      label: Caderno de Receitas do Mar (PDF)
    routing:
      description: Esta coleção contém diversas receitas de pratos à base de peixe,
        especialmente focadas na culinária do Algarve e do Alentejo.
      keywords:
      - peixe fresco
      - receitas de peixe
      - guisados
      - sardinhas
      - arroz carolino
      - azeite virgem extra
      - tomate maduro
      - gastronomia alentejana
      - mariscos
      - culinária do Algarve
      - pescados do mar
      - receitas tradicionais
      - cozinha mediterrânica
      - tapas
      - comida caseira
      typical_questions:
      - Quais são algumas receitas típicas de peixe do Algarve?
      - Como preparar sardinhas grelhadas?
      - Quais ingredientes são necessários para um guisado de peixe?
      - Como faço uma receita de arroz de marisco?
      - Quais são os principais pratos da cozinha alentejana?
      not_covered:
      - receitas vegetarianas
      - sobremesas
      - bebidas alcoólicas
      - petiscos de carne
      - comida rápida
      language: pt
      doc_type: recipe_book
    scraper_config:
      name: peixe_fresco_recipes
      engine: playwright
      scrape_mode: sitemap
      sitemap_url: https://store.peixefresco.com.pt/receitas-sitemap.xml
      text_selector: main, article, .entry-content, body
  - id: peixe_fresco_faq
    display_name: faq
    collection_name: peixe_fresco_faq
    collection_type: scs
    scraper_name: peixe_fresco_faq
