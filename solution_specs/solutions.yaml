        e serviços de entrega relacionados a produtos de peixe fresco.
      keywords:
      - peixe fresco
      - entregas grátis
      - cookies
      - pesca sustentável
      - avaliações 5 estrelas
      - filetes
      - postas
      - bivalves
      - aquicultura
      - política de privacidade
      - experiência de navegação
      - website
      - produtos do mar
      - cart
      - consentimento
      typical_questions:
      - Qual é a política de privacidade do site?
      - Como funcionam as entregas de peixe fresco?
      - O que significa pesca sustentável?
      - O que são produtos bivalves disponíveis?
      - Como posso melhorar minha experiência de navegação?
      not_covered:
      - receitas de peixe
      - técnicas de culinária
      - informações nutricionais
      - história da pesca
      - dicas de conservação
      language: pt
      doc_type: faq
