# ── About this extraction ──
# Mode:        structured
# Good for:    E-commerce product pages with consistent HTML structure.
#              Uses CSS selectors to extract specific fields (name, price, etc.)
#              into a chunk template. One chunk per product page.
# Data:        Product name, price, cooking purpose, preparation type, description.
#              WooCommerce attribute rows extracted via row_name matching.
# Not for:     Pages without consistent CSS selectors or with JS-rendered content
#              that standard selectors can't reach (use custom_js instead).
# Limitations: Selectors are site-specific — won't work on other stores without
#              updating. Elementor overrides some default WooCommerce classes.
# ──
description: "Extracts product catalog data via CSS selectors — name, price, attributes, description"
name: peixe_fresco_products
engine: playwright
scrape_mode: sitemap
sitemap_url: "https://store.peixefresco.com.pt/product-sitemap.xml"
url_filter: "/produto/"
structured_extraction:
  name: ".product_title"
  price: "h2.elementor-heading-title:has(.woocommerce-Price-amount)"
  description: ".woocommerce-Tabs-panel--description"
attribute_rows:
  - row_name: "Finalidade"
    field: "finalidade"
  - row_name: "Preparação"
    field: "preparacao"
chunk_template: |
  Product: {name}
  Price: {price}
  Finalidade: {finalidade}
  Preparação: {preparacao}
  Description: {description}
  URL: {url}
