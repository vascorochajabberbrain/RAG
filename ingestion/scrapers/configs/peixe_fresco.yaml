# ── About this extraction ──
# Mode:        structured (legacy)
# Good for:    This was the original recipe scraper using CSS selectors. Replaced by
#              peixe_fresco_recipes.yaml which uses custom_js_extraction for better
#              Elementor compatibility. Kept for backward compat with existing data.
# Data:        Recipe title, ingredients, preparation, linked product.
# Not for:     New recipe scraping — use peixe_fresco_recipes.yaml instead.
# Limitations: CSS selectors don't reliably work with Elementor widget structure.
#              Superseded by custom_js approach.
# ──
description: "Legacy recipe scraper using CSS selectors — superseded by peixe_fresco_recipes"
name: peixe_fresco
engine: playwright
scrape_mode: sitemap
sitemap_url: "https://store.peixefresco.com.pt/receitas-sitemap.xml"
url_filter: "/receitas/"
structured_extraction:
  title: "h1"
  ingredients: "li under Ingredientes"
  preparation: "li under Modo de Preparação"
  linked_product: ".woocommerce-loop-product__title"
  linked_product_url: "url of .produto-utilizado a"
chunk_template: |
  Recipe: {title}
  Ingredients:
  {ingredients}
  Preparation:
  {preparation}
  Linked Product: {linked_product} — {linked_product_url}
  URL: {url}
